# Block PRs that introduce dependencies with HIGH/CRITICAL CVEs.
# docs/architecture.md §20.7. ADR-0011 for action-pinning rationale.
# Workflow-injection hardening: no untrusted-input interpolation in run:.
#
# REQUIRES: GitHub Dependency Graph enabled on the repository.
#   Settings → Security → Dependency graph → "Enable".
# If disabled, the action exits non-zero with a clear message. The job
# is marked continue-on-error: true so a fresh clone of the repo can land
# PRs before the maintainer enables the feature; flip back to false once
# the dependency graph is on.

name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later
