# Block PRs that introduce dependencies with HIGH/CRITICAL CVEs.
# docs/architecture.md §20.7. ADR-0011 for action-pinning rationale.
# Workflow-injection hardening: no untrusted-input interpolation in run:.
#
# REQUIRES: GitHub Dependency Graph enabled on the repository.
#   Settings → Security → Dependency graph.
# Enabled 2026-05-26 — this job is a hard gate (blocks PRs that add HIGH+
# CVE deps or GPL/AGPL-licensed deps).

name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: depreview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # `deny-licenses` is deprecated (actions/dependency-review-action#997)
          # — the action recommends an allow-list. We allow the OSI-permissive
          # set (verified to cover the entire current dependency graph via
          # `pnpm licenses list`), which blocks copyleft (GPL/AGPL/LGPL/EPL/…)
          # by omission. Unknown/undetected licenses warn but don't fail.
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD, ISC,
            BlueOak-1.0.0, CC0-1.0, CC-BY-4.0, Unlicense, Python-2.0, OFL-1.1,
            Zlib, MPL-2.0
          # Skip the license check for our OWN first-party workspace packages
          # (all Apache-2.0, never published to npm). As `workspace:*` deps the
          # action can't resolve a registry license and would warn "unknown" —
          # but these are first-party code, not third-party supply-chain deps to
          # license-review. Keep in sync when adding a packages/* package.
          allow-dependencies-licenses: >-
            pkg:npm/@ehrbase-ui/config-eslint, pkg:npm/@ehrbase-ui/config-tsconfig,
            pkg:npm/@ehrbase-ui/demographic-core,
            pkg:npm/@ehrbase-ui/i18n, pkg:npm/@ehrbase-ui/openehr-am, pkg:npm/@ehrbase-ui/openehr-aql,
            pkg:npm/@ehrbase-ui/openehr-base, pkg:npm/@ehrbase-ui/openehr-cds,
            pkg:npm/@ehrbase-ui/openehr-flat, pkg:npm/@ehrbase-ui/openehr-its-rest,
            pkg:npm/@ehrbase-ui/openehr-proc, pkg:npm/@ehrbase-ui/openehr-rm,
            pkg:npm/@ehrbase-ui/openehr-term, pkg:npm/@ehrbase-ui/openehr-web-template,
            pkg:npm/@ehrbase-ui/term-adapter-generic-fhir, pkg:npm/@ehrbase-ui/term-adapter-snowstorm,
            pkg:npm/@ehrbase-ui/term-core,
            pkg:npm/@ehrbase-ui/valkey
