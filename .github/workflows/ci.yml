# Main CI workflow — runs on every PR + every push to main.
# docs/architecture.md §20.3.
# Action pinning strategy: ADR-0011 (semver tags, not SHAs).
#
# Security notes (workflow-injection hardening):
# - No untrusted input (github.event.issue.title, github.head_ref, etc.) is
#   interpolated into any `run:` block. If a future job needs such input,
#   use env: with $-shell-quoting per
#   https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
#
# pnpm + Node ordering, per https://github.com/pnpm/action-setup:
#   1. pnpm/action-setup@v6 with `standalone: true` installs @pnpm/exe
#      (Node-bundled binary). This works even when the runner's default
#      Node is older than what pnpm 11.3.0 requires (>= 22.13).
#   2. pnpm/action-setup's built-in `cache: true` handles store caching
#      (auto store-prune post-action, lockfile-keyed).
#   3. actions/setup-node@v6 installs the Node version from .nvmrc (no
#      `cache:` parameter — pnpm/action-setup already cached the store).
#   4. `pnpm install --frozen-lockfile`.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint, typecheck, unit + a11y
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          standalone: true
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify pnpm audit signatures (supply chain — §5.12)
        run: pnpm audit signatures
        continue-on-error: true

      - name: Compile Paraglide messages (generated module — gitignored)
        run: pnpm paraglide:compile

      - name: i18n message completeness (§11.7)
        run: pnpm --filter @ehrbase-ui/i18n exec node scripts/paraglide-check.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm exec eslint . --max-warnings=0

      - name: Unit + accessibility tests
        run: pnpm --filter @ehrbase-ui/web run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: apps/web/coverage/
          retention-days: 14

  build:
    name: Build app
    runs-on: ubuntu-24.04
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          standalone: true
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  storybook-build:
    name: Build Storybook
    runs-on: ubuntu-24.04
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          standalone: true
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: pnpm install --frozen-lockfile
      - name: Compile Paraglide messages (generated module — gitignored)
        run: pnpm paraglide:compile
      - run: pnpm run storybook:build
      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/web/storybook-static/
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    needs: quality
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          standalone: true
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: pnpm install --frozen-lockfile
      - name: Compile Paraglide messages
        # src/server.ts imports @/paraglide/server.js eagerly (official
        # Paraglide + TanStack Start integration). On a fresh runner the
        # generated dir doesn't exist yet; vite dev's plugin compile races
        # the server-entry resolution and Playwright's webServer times out.
        run: pnpm paraglide:compile
      - name: Install Playwright Chromium
        run: pnpm --filter @ehrbase-ui/web exec playwright install --with-deps chromium
      - run: pnpm e2e
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  e2e-integration:
    # Full auth-flow E2E against the live stack (Keycloak + Valkey + the audit
    # database). Brings up the compose services, applies the append-only audit
    # migration, then runs the gated auth.spec.ts (E2E_FULL_STACK=1).
    # docs/architecture.md §5, §14; Milestone 2 verification step 7.
    name: Playwright E2E (full stack)
    runs-on: ubuntu-24.04
    needs: quality
    timeout-minutes: 30
    env:
      VALKEY_URL: redis://localhost:6379
      AUDIT_DB_URL: postgres://audit_writer:audit_writer@localhost:5432/audit
      AUDIT_DB_OWNER_URL: postgres://audit_owner:audit_owner@localhost:5432/audit
      AUDIT_PSEUDONYM_SECRET: dev-only-rotate-in-prod
      AUTH_DB_URL: postgres://auth_writer:auth_writer@localhost:5432/auth
      AUTH_DB_OWNER_URL: postgres://auth_owner:auth_owner@localhost:5432/auth
      # M7 demographic DB (ADR-0031) — created on fresh-volume boot by
      # platform-db-init/demographic.sql; db:migrate now runs its config too.
      DEMOGRAPHIC_PROVIDER: builtin
      DEMOGRAPHIC_DB_URL: postgres://demographic_writer:demographic_writer@localhost:5432/demographic
      DEMOGRAPHIC_DB_OWNER_URL: postgres://demographic_owner:demographic_owner@localhost:5432/demographic
      BETTER_AUTH_SECRET: dev-only-rotate-in-prod
      BETTER_AUTH_URL: http://localhost:3000
      SSO_KEYCLOAK_PROVIDER_ID: keycloak
      SSO_KEYCLOAK_ISSUER: http://localhost:8180/realms/ehrbase
      SSO_KEYCLOAK_CLIENT_ID: ehrbase-ui
      SSO_KEYCLOAK_CLIENT_SECRET: dev-only-rotate-in-prod
      KEYCLOAK_ISSUER_URL: http://localhost:8180/realms/ehrbase
      KEYCLOAK_INTERNAL_ISSUER_URL: http://localhost:8180/realms/ehrbase
      KEYCLOAK_CLIENT_ID: ehrbase-ui
      KEYCLOAK_CLIENT_SECRET: dev-only-rotate-in-prod
      KEYCLOAK_REDIRECT_URI: http://localhost:3000/api/auth/callback
      EHRBASE_URL: http://localhost:8080/ehrbase/rest/openehr/v1
      E2E_FULL_STACK: '1'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          standalone: true
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: pnpm install --frozen-lockfile
      - name: Compile Paraglide messages
        run: pnpm paraglide:compile
      - name: Build app (the full-stack suite runs against the built server)
        run: pnpm build
      - name: Start stack (Keycloak + Valkey + audit DB)
        run: docker compose up -d --wait platform-db valkey keycloak
      - name: Apply Keycloak config (realm + clients + demo users, synchronous)
        # `docker compose run` blocks until the one-shot keycloak-config-cli
        # container exits, unlike `up --wait` which has known timing issues for
        # one-shot containers without a healthcheck. Without this the
        # e2e/auth.spec.ts beforeAll races config application and can see a
        # fresh Keycloak without the realm/clients/demo identities. ADR-0036.
        run: docker compose run --rm keycloak-config
      - name: Apply DB migrations (audit + auth + demographic)
        run: pnpm db:migrate
      - name: Install Playwright Chromium
        run: pnpm --filter @ehrbase-ui/web exec playwright install --with-deps chromium
      - name: Run full-stack E2E
        # NODE_ENV=development so the session cookie is not Secure-only over the
        # http://localhost test origin (the built bundle is unchanged).
        env:
          NODE_ENV: development
        run: pnpm --filter @ehrbase-ui/web exec playwright test e2e/auth.spec.ts
      - if: always()
        run: docker compose logs --no-color > docker-logs.txt || true
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-integration
          path: |
            apps/web/playwright-report/
            docker-logs.txt
          retention-days: 14
