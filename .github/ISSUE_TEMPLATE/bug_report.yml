name: Bug report
description: Report a defect in ehrbase-ui
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Before submitting, please:
        - Check existing issues to avoid duplicates.
        - For **security** issues, do NOT file a public bug — see
          `docs/governance/SECURITY.md` for the disclosure channel.
        - Never include real patient data, real BSN/NHI, or real
          credentials in this issue.
  - type: input
    id: version
    attributes:
      label: ehrbase-ui version
      description: 'Output of `git describe --tags --always` or the deployed image tag.'
      placeholder: 'v0.1.0 / chore/foundation@abc1234'
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Deployment context
      description: 'docker compose? Kubernetes? local pnpm dev?'
      placeholder: 'docker compose up via repo Dockerfile'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. `pnpm dev`
        2. Open /patients
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (with PHI redacted)
      render: shell
