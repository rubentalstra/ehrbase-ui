# Dependabot config — docs/architecture.md §20.8.
# Daily npm, weekly github-actions, weekly docker base image updates.

version: 2
updates:
  # npm dependencies — daily
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'Europe/Amsterdam'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      tanstack:
        patterns:
          - '@tanstack/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@eslint-react/*'
          - 'typescript-eslint'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - '@chromatic-com/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'vitest-axe'
          - 'axe-core'
          - '@axe-core/*'
          - '@playwright/*'
          - '@testing-library/*'
      types:
        patterns:
          - '@types/*'
      radix:
        patterns:
          - 'radix-ui'
          - '@radix-ui/*'

  # GitHub Actions — weekly. Major-version tags per ADR-0011.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:30'
      timezone: 'Europe/Amsterdam'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'

  # Docker base images — weekly.
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Amsterdam'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore(docker)'
