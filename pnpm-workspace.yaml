# Monorepo workspace + pnpm settings.
#
# Layout per ADR-0030: apps/ holds deployable surfaces, packages/ holds the
# per-openEHR-spec libraries + cross-cutting platform packages + shared
# config packages. Workspace deps inside the repo reference each other via
# the `workspace:*` protocol; nothing here is published to npm.

packages:
  - apps/*
  - packages/*

# Settings below match the pre-monorepo posture verbatim — pinned for audit
# visibility, not because they differ from pnpm 11 defaults.

# 24-hour minimum age before a newly-published version is installable.
# Defends against zero-day publish-and-spread supply-chain attacks
# (e.g. CVE-2026-45321 TanStack compromise, May 2026).
minimumReleaseAge: 1440

# Refuse installs that reference dependencies via exotic protocols
# (git URLs, etc.) inside sub-dependencies.
blockExoticSubdeps: true

# Auto-install peer dependencies declared in installed packages.
autoInstallPeers: true

# Don't fail on peer-dep mismatches; warn instead. Mismatches are
# investigated via Dependabot PRs, not by blocking developer workflow.
strictPeerDependencies: false

# Whitelist of packages whose install scripts may run. Everything else is
# build-blocked to remove the post-install-script attack surface.
# Required for Vite's underlying bundlers.
onlyBuiltDependencies:
  - esbuild
  - lightningcss

allowBuilds:
  esbuild: true
  msw: true
  protobufjs: set this to true or false

minimumReleaseAgeExclude:
  - ioredis@5.11.0

# Force transitive vulnerabilities pulled in by @better-auth/sso (we use
# OIDC to Keycloak, not SAML — these saml-only branches still ship in the
# dep graph). Both fix the listed advisories without changing our runtime
# (samlify is never imported; uuid is only used inside samlify's SAML
# assertion path).
#
#   samlify >= 2.13.0   → GHSA-34r5-q4jw-r36m  (HIGH      — XML injection
#                                                          in SAML
#                                                          AttributeValue)
#   uuid    >= 11.1.1   → GHSA-w5hq-g745-h8pq  (MODERATE  — missing
#                                                          buffer-bounds
#                                                          check in v3/v5/v6
#                                                          with `buf` arg)
overrides:
  samlify: 2.13.1
  uuid: 11.1.1
