# Single-binary Loki 3.7.x dev config.
#
# Filesystem chunk + index storage; no replication. Production deployments
# swap for object storage (S3/GCS/Azure) and add ingester/distributor
# replication factor ≥ 3. The OTLP HTTP receiver is enabled so the collector
# can push log records directly without a Promtail intermediate.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# OTLP HTTP receiver — the collector pushes to /otlp on the HTTP port.
distributor:
  otlp_config:
    default_resource_attributes_as_index_labels:
      - service.name
      - service.namespace
      - service.instance.id
      - deployment.environment

limits_config:
  retention_period: 720h # 30 days

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
