# Prometheus 3.x dev config.
#
# The OTLP receiver is enabled via --web.enable-otlp-receiver (in the
# compose command flags). The collector pushes via /api/v1/otlp.
#
# Tempo metrics-generator's remote_write target is /api/v1/write — that
# requires --web.enable-remote-write-receiver (also in the compose flags).
#
# Self-scrape gives us Prometheus's own metrics for dashboard sanity checks.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ehrbase-ui-dev
    monitor: prometheus

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
    # The collector's own self-telemetry port — enabled by the service
    # telemetry block in collector-config.yaml.

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
