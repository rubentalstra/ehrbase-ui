# Grafana dashboard auto-provisioning.
#
# Every JSON file in the dashboards/ directory beside this provider file is
# loaded as a dashboard at boot. v1.0 ships one — ehrbase-ui.json (request
# rate, p95 latency, error rate, login counters). Future milestones add
# their own dashboards by dropping JSON in the same directory.

apiVersion: 1

providers:
  - name: ehrbase-ui
    orgId: 1
    folder: ehrbase-ui
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
