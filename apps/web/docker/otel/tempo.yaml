# Single-binary Tempo 3.x dev config (docs/architecture.md §13.2).
#
# Tempo 3.0 (May 2026) reorganised the config surface — see
#   https://github.com/grafana/tempo/blob/v3.0.0/example/docker-compose/single-binary/tempo.yaml
# Key shape changes vs the 2.x configs in older guides:
#   - The standalone `compactor:` block was removed; compaction is built-in
#     and configured under the new `backend-scheduler:` if you need to tune
#     it. The default 30-day retention is fine for dev.
#   - The `storage.trace.block.version` key was removed; vParquet5 is the
#     default and the only supported encoding in 3.x.
#   - `query_frontend.mcp_server.enabled` is new — exposes the MCP server.
#   - `usage_report.reporting_enabled` opts out of Grafana telemetry.
#
# Production deployments swap the `local` storage backend for S3 / GCS /
# Azure (whichever EU object store the hospital uses) and add the
# replication/redundancy block. v1.0 dev is single-binary local disk.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: ['span-metrics', 'service-graphs']
      generate_native_histograms: both

# Opt out of Grafana Labs anonymous usage telemetry (cluster-id, version,
# enabled-feature counts). Hospital deployments default to no outbound
# telemetry on principle.
usage_report:
  reporting_enabled: false
