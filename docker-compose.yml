# Development stack for ehrbase-ui.
# docs/architecture.md §18 — all images pinned to exact tags, never :latest.
# Observability stack (Loki, Tempo, Prometheus, OTel collector) is kept
# commented out until Milestone 7 lands the corresponding wiring.

services:
  ehrbase-db:
    # EHRbase ships a companion Postgres image that pre-creates the
    # ehrbase / ehrbase_restricted roles + the extensions EHRbase needs.
    # Vanilla postgres:18 does NOT have these, so EHRbase's Flyway migration
    # fails against it. The companion image is PG16-based (only 16.2 is
    # published) — this is the one place the stack is not on PG18. Keycloak's
    # DB below stays on vanilla postgres:18.4. See docs/architecture.md §18
    # note + REFERENCES drift list.
    image: ehrbase/ehrbase-v2-postgres:16.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASSWORD_ADMIN: ehrbase
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASSWORD: ehrbase_restricted
    volumes:
      # PG16 image uses the classic /var/lib/postgresql/data mount.
      - ehrbase_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ehrbase-net]

  ehrbase:
    # Pin to an exact version. Never use :latest.
    image: ehrbase/ehrbase:2.31.0
    # EHRbase builds its OAuth2 JwtDecoder at startup by fetching Keycloak's
    # OIDC discovery doc, so it must not start until the realm EXISTS. The realm
    # is now applied by keycloak-config (not --import-realm), which runs AFTER
    # keycloak is healthy — so we gate on keycloak-config completing, not merely
    # on keycloak's health. Deterministic ordering, no boot-time error noise.
    # restart: unless-stopped is an orthogonal runtime-resilience policy
    # (recover from a later crash), not the startup-ordering mechanism.
    restart: unless-stopped
    depends_on:
      ehrbase-db: { condition: service_healthy }
      keycloak-config: { condition: service_completed_successfully }
    environment:
      DB_URL: jdbc:postgresql://ehrbase-db:5432/ehrbase
      # EHRbase 2.x two-user model: admin runs Flyway migrations, the
      # restricted user is the runtime connection. Both are created by the
      # companion postgres image above.
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ehrbase
      DB_USER: ehrbase_restricted
      DB_PASS: ehrbase_restricted
      SECURITY_AUTHTYPE: OAUTH
      # EHRbase 2.x wires its JwtDecoder from the STANDARD Spring Boot
      # resource-server property spring.security.oauth2.resourceserver.jwt.*.
      # Spring's env-var binding drops the hyphen in `issuer-uri`, so the
      # var is ...JWT_ISSUERURI (not ISSUER_URI). The arch-doc §18 names
      # (SECURITY_OAUTH_ISSUER_URI) bind to nothing → no JwtDecoder bean →
      # "APPLICATION FAILED TO START". See docs/architecture.md §18 note.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI: http://keycloak:8080/realms/ehrbase
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSETURI: http://keycloak:8080/realms/ehrbase/protocol/openid-connect/certs
      SECURITY_OAUTH2USERROLE: clinician
      SECURITY_OAUTH2ADMINROLE: admin
      ADMIN_API_ACTIVE: 'true'
    ports: ['8080:8080']
    networks: [ehrbase-net]

  # Shared platform Postgres instance. Hosts BOTH the Keycloak database and
  # the app-owned `audit` database (Milestone 2 — the app's first owned DB).
  # The audit DB + its least-privilege roles are created on first boot by the
  # init script mounted below. AUDIT_DB_URL is a standalone env var so prod
  # can point the audit DB at a physically separate managed Postgres with no
  # code change (docs/architecture.md §5, §14; ADR-0013).
  platform-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      # Postgres 18+ mount convention (see ehrbase-db above).
      - platform_pg:/var/lib/postgresql
      # First-boot init: create the `audit` database + audit_owner/audit_writer
      # roles with least-privilege grants. Runs once per fresh volume.
      - ./platform-db-init:/docker-entrypoint-initdb.d:ro
    # Exposed for host-side `pnpm dev` + `pnpm db:migrate`. Not exposed in a
    # production deployment (the app reaches it on the internal network).
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ehrbase-net]

  keycloak:
    # CVE-2026-37981 floor (§5.12).
    image: quay.io/keycloak/keycloak:26.6.2
    # No `--import-realm`: realm + clients (+ dev users) are applied
    # declaratively, idempotently, and update-in-place by the keycloak-config
    # service below (adorsys/keycloak-config-cli). `--import-realm` could only
    # create-or-recreate a realm, never update it — ADR-0036.
    command: start-dev
    depends_on:
      platform-db: { condition: service_healthy }
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://platform-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Keycloak 26 renamed the bootstrap-admin vars; the old KEYCLOAK_ADMIN*
      # names are deprecated (KC-SERVICES0110).
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: 'false'
      KC_HEALTH_ENABLED: 'true'
    ports: ['8180:8080']
    # Health gate on the management-port /health/ready endpoint (port 9000,
    # enabled by KC_HEALTH_ENABLED). Keycloak now reports UP as soon as the
    # server is ready — the realm is applied AFTER this by keycloak-config, so
    # realm-dependent services (ehrbase, ui, grafana) gate on keycloak-config's
    # completion, NOT on this healthcheck. The Keycloak 26 image has no
    # curl/wget, but it ships bash — so we use bash's /dev/tcp to speak raw HTTP.
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-c',
          "exec 3<>/dev/tcp/localhost/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [ehrbase-net]

  # Keycloak configuration-as-code — one-shot, declarative, idempotent
  # (ADR-0036). Applies the realm + roles + all three OIDC clients from
  # keycloak/config/ehrbase-realm.json and the four dev demo users from
  # keycloak/config/ehrbase-users.dev.json, UPDATING in place on every up. This is the
  # official replacement for the old bespoke kcadm shell scripts (realm import
  # + grafana-client sync + demo-user seed) — one tool, one source of truth.
  #
  # Secrets are injected via keycloak-config-cli variable substitution
  # ($(env:VAR) with IMPORT_VARSUBSTITUTION_ENABLED) so prod rotates via env,
  # no file edit. PRODUCTION excludes the dev users by pointing
  # IMPORT_FILES_LOCATIONS at ehrbase-realm.json only (this dev compose globs
  # *.json). keycloak-config-cli manages only the collections each file
  # defines, so ehrbase-users.dev.json (users only) never touches the baseline clients.
  #
  # Image: pinned to the 26.x-line build (no 26.6.x tag is published yet; the
  # Keycloak 26 admin API is stable across minors, so this is compatible with
  # our keycloak:26.6.2). Never :latest (Inviolable rule 5).
  keycloak-config:
    image: adorsys/keycloak-config-cli:6.5.1-26.5.5
    depends_on:
      keycloak: { condition: service_healthy }
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: 'true'
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_VARSUBSTITUTION_ENABLED: 'true'
      IMPORT_FILES_LOCATIONS: '/config/*.json'
      GRAFANA_OIDC_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET:-dev-only-rotate-in-prod}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-only-rotate-in-prod}
    volumes:
      - ./keycloak/config:/config:ro
    networks: [ehrbase-net]
    restart: 'no'

  # Valkey: BSD-licensed Redis fork. ioredis works against it unchanged.
  # CVE floor 9.1.0 (§5.12).
  valkey:
    image: valkey/valkey:9.1.0-alpine
    command: ['valkey-server', '--appendonly', 'yes']
    volumes:
      - valkey_data:/data
    # Exposed for host-side `pnpm dev`. Not exposed in production.
    ports: ['6379:6379']
    networks: [ehrbase-net]
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # Virus scanning for DV_MULTIMEDIA uploads (§7.x). Runs as a SIDECAR (not in
  # our process) so ClamAV's GPLv2 stays well-fenced from the Apache-2.0 app.
  # clamd listens on TCP 3310 (INSTREAM); freshclam keeps signatures current.
  # The UI gates on service_started (uploads are scanned lazily at request time,
  # and the first-boot signature load takes a few minutes via freshclam).
  clamav:
    image: clamav/clamav:1.4.3
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    # Exposed for host-side `pnpm dev` upload scanning. Not exposed in production.
    ports: ['3310:3310']
    networks: [ehrbase-net]
    healthcheck:
      # clamdcheck.sh PINGs clamd; only healthy once signatures are loaded.
      test: ['CMD', 'clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Audit-log cold-tier archive (M4 — ADR-0027). SeaweedFS is the open-source
  # dev default; AWS S3 is the production WORM-compliant alternative. The
  # warm Postgres tier (ADR-0013 trigger) is the AUTHORITATIVE immutability
  # layer for v1.0 — see ADR-0027 for the SeaweedFS WORM-enforcement gap
  # (seaweedfs#8350) we accept here in exchange for an Apache-2.0,
  # actively-maintained, Docker-shippable default.
  seaweedfs:
    image: chrislusf/seaweedfs:3.94
    # One-process `server -s3` runs master + volume + filer + S3 gateway.
    # The S3 API listens on 8333 and is what @aws-sdk/client-s3 talks to.
    command: ['server', '-s3', '-dir=/data']
    volumes:
      - seaweedfs_data:/data
    ports:
      - '8333:8333' # S3 API (host-side `pnpm dev` archive smoke)
    networks: [ehrbase-net]
    healthcheck:
      # /status on the S3 endpoint returns 200 once the gateway is ready.
      # 127.0.0.1 (not `localhost`) because busybox wget inside this image
      # resolves localhost to ::1 — but SeaweedFS binds only to IPv4.
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8333/status']
      interval: 10s
      timeout: 3s
      retries: 10

  # One-shot bucket-init: creates `audit-archive` with Object Lock enabled at
  # bucket creation. The Object Lock API surface is exercised end-to-end here
  # so a regression in the cold-store wiring fails on docker-compose bring-up
  # rather than at the first archive write. The bucket-creation idempotency
  # is provided by `|| true` — re-runs are safe.
  seaweedfs-init:
    image: amazon/aws-cli:2.17.43
    depends_on:
      seaweedfs: { condition: service_healthy }
    environment:
      AWS_ACCESS_KEY_ID: dev-access-key
      AWS_SECRET_ACCESS_KEY: dev-secret-key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        aws --endpoint-url http://seaweedfs:8333
        s3api create-bucket --bucket audit-archive --object-lock-enabled-for-bucket
        || true
    networks: [ehrbase-net]
    restart: 'no'

  # Observability stack (Milestone 5 — docs/architecture.md §13).
  # OTel collector → Tempo (traces) + Loki (logs) + Prometheus (metrics) →
  # Grafana (UI, Keycloak-SSO-gated). All image tags web-verified May 2026.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./apps/web/docker/otel/collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '8888:8888' # collector self-telemetry (Prometheus scrape)
    networks: [ehrbase-net]
    depends_on:
      tempo: { condition: service_started }
      loki: { condition: service_started }
      prometheus: { condition: service_started }

  tempo:
    image: grafana/tempo:3.0.0
    command: ['-config.file=/etc/tempo.yaml']
    volumes:
      - ./apps/web/docker/otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - '3200:3200' # Tempo HTTP query API (Grafana datasource)
    networks: [ehrbase-net]

  loki:
    image: grafana/loki:3.7.2
    command: ['-config.file=/etc/loki.yaml']
    volumes:
      - ./apps/web/docker/otel/loki.yaml:/etc/loki.yaml:ro
      - loki_data:/loki
    ports:
      - '3100:3100'
    networks: [ehrbase-net]

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-otlp-receiver'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./apps/web/docker/otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks: [ehrbase-net]

  grafana:
    # OSS variant (NOT grafana/grafana — the unified image that can switch
    # to Enterprise with a license). Explicit OSS posture for the open-source
    # project.
    image: grafana/grafana-oss:13.0.1
    depends_on:
      tempo: { condition: service_started }
      loki: { condition: service_started }
      prometheus: { condition: service_started }
      # Gate on keycloak-config (not keycloak health): the grafana OIDC client
      # is created by keycloak-config, so it must exist before Grafana's first
      # OIDC discovery.
      keycloak-config: { condition: service_completed_successfully }
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3030
      # Disable Grafana's built-in login form — Keycloak SSO is the only
      # auth path. Hospital admins sign in with their realm identities.
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      # Break-glass local admin in case Keycloak is unreachable (login form
      # is disabled, but the OAuth bypass route works for the local admin).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Generic OAuth → Keycloak realm 'ehrbase'.
      GF_AUTH_GENERIC_OAUTH_ENABLED: 'true'
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: 'true'
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET:-dev-only-rotate-in-prod}
      GF_AUTH_GENERIC_OAUTH_SCOPES: 'openid profile email offline_access'
      # The auth_url is browser-redirected (must be reachable from the
      # operator's browser); token + api URLs are server-to-server inside
      # the Docker network, so we route them via the internal hostname.
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://localhost:8180/realms/ehrbase/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/realms/ehrbase/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak:8080/realms/ehrbase/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: name
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      # JMESPath over the realm_access.roles claim:
      #   admin           → Grafana 'Admin'
      #   audit-reviewer  → 'Editor'   (can build compliance dashboards)
      #   anyone else     → 'Viewer'
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(realm_access.roles[*], 'admin') && 'Admin' || contains(realm_access.roles[*], 'audit-reviewer') && 'Editor' || 'Viewer'
      # Server-admin role assignment off by default — flip on in production
      # if you want Keycloak to also drive server-level admin rights.
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: 'false'
      # OAuth public-client best practices.
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: 'true'
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: 'true'
      # Single-logout — signing out of Grafana also kills the Keycloak SSO
      # session via post-logout redirect.
      GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL: 'http://localhost:8180/realms/ehrbase/protocol/openid-connect/logout?post_logout_redirect_uri=http%3A%2F%2Flocalhost%3A3030%2Flogin'
    ports:
      - '3030:3000' # Grafana on host 3030 — 3000 is reserved for the app.
    volumes:
      - ./apps/web/docker/otel/grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks: [ehrbase-net]
    extra_hosts:
      # Same host-gateway hack as the ui service — Keycloak's browser-
      # facing URL is http://localhost:8180 but Grafana needs to resolve
      # `localhost` from inside its container to the host.
      - 'localhost:host-gateway'

  # One-shot drizzle-kit migration runner. Uses the builder Docker stage so
  # it has pnpm + the source-tree drizzle migration files (the runner image
  # only ships the Nitro bundle). Runs BOTH audit + auth migrations before
  # the ui starts, idempotent — drizzle-kit's __drizzle_migrations bookkeeping
  # table means re-runs no-op.
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      platform-db: { condition: service_healthy }
    environment:
      AUDIT_DB_OWNER_URL: postgres://audit_owner:audit_owner@platform-db:5432/audit
      AUTH_DB_OWNER_URL: postgres://auth_owner:auth_owner@platform-db:5432/auth
    networks: [ehrbase-net]
    restart: 'no'

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      # EHRbase has no healthcheck (distroless image, no shell) and the UI
      # only calls it lazily at request time, so service_started is enough.
      # Keycloak + Valkey ARE gated on health since the BFF (Milestone 2)
      # talks to them on the auth path.
      ehrbase: { condition: service_started }
      # Better Auth registers its SSO provider via Keycloak OIDC discovery, so
      # the realm + ehrbase-ui client must exist first → gate on keycloak-config
      # completing, not merely on keycloak's health.
      keycloak-config: { condition: service_completed_successfully }
      valkey: { condition: service_healthy }
      platform-db: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      # Uploads are scanned lazily; don't block UI boot on the slow first-boot
      # ClamAV signature load.
      clamav: { condition: service_started }
      db-migrate: { condition: service_completed_successfully }
    # The Better Auth SSO plugin uses ONE issuer URL per provider — both the
    # server-side OIDC discovery fetch AND the browser redirect target use
    # the same URL. The browser needs `http://localhost:8180`; we therefore
    # make `localhost` inside the ui container resolve to the host gateway
    # so the SSR side can hit the same address (Docker Desktop ships this
    # as `host-gateway`).
    extra_hosts:
      - 'localhost:host-gateway'
    environment:
      # Dev compose runs in development mode. HSTS, secure-only cookies,
      # and the enforcing CSP all gate on isProduction; production
      # deployments override this in their orchestrator env.
      NODE_ENV: development
      PORT: '3000'
      EHRBASE_URL: http://ehrbase:8080/ehrbase/rest/openehr/v1
      # Browser-facing Keycloak URL (redirects) vs internal URL (token/JWKS).
      # The issuer is pinned stable via KC_HOSTNAME so token validation agrees
      # on both sides (docs/architecture.md §5.4; the classic docker OIDC gotcha).
      KEYCLOAK_ISSUER_URL: http://localhost:8180/realms/ehrbase
      KEYCLOAK_INTERNAL_ISSUER_URL: http://keycloak:8080/realms/ehrbase
      KEYCLOAK_CLIENT_ID: ehrbase-ui
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-only-rotate-in-prod}
      KEYCLOAK_REDIRECT_URI: http://localhost:3000/api/auth/callback
      # Better Auth + SSO plugin (ADR-0028/0029). The SSO_KEYCLOAK_* vars
      # configure the OIDC provider Better Auth registers in the
      # `sso_provider` table on first request. KEYCLOAK_INTERNAL_ISSUER_URL
      # above mirrors the same issuer for the M2 legacy path during the
      # transition; both can point at the same realm.
      AUTH_DB_URL: postgres://auth_writer:auth_writer@platform-db:5432/auth
      AUTH_DB_OWNER_URL: postgres://auth_owner:auth_owner@platform-db:5432/auth
      # ≥32 char dev secret — Better Auth warns at startup below that floor.
      # Production injects a real value via the env (see .env.example).
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-rotate-in-prod-please-this-is-32-chars}
      BETTER_AUTH_URL: http://localhost:3000
      SSO_KEYCLOAK_PROVIDER_ID: keycloak
      # Single URL — see the `extra_hosts: localhost:host-gateway` block
      # above for why this is the externally-reachable URL even from
      # inside the ui container.
      SSO_KEYCLOAK_ISSUER: http://localhost:8180/realms/ehrbase
      SSO_KEYCLOAK_CLIENT_ID: ehrbase-ui
      SSO_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-only-rotate-in-prod}
      VALKEY_URL: redis://valkey:6379
      # ClamAV sidecar for DV_MULTIMEDIA upload scanning (§7.x).
      CLAMAV_HOST: clamav
      CLAMAV_PORT: '3310'
      # Runtime audit writes use the least-privilege audit_writer role (INSERT+
      # SELECT only). Migrations use the owner URL (see .env.example).
      AUDIT_DB_URL: postgres://audit_writer:audit_writer@platform-db:5432/audit
      AUDIT_DB_OWNER_URL: postgres://audit_owner:audit_owner@platform-db:5432/audit
      AUDIT_RETENTION_DB_URL: postgres://audit_retention:audit_retention@platform-db:5432/audit
      AUDIT_LOG_PATH: /var/log/ehrbase-ui/audit.ndjson
      AUDIT_PSEUDONYM_SECRET: ${AUDIT_PSEUDONYM_SECRET:-dev-only-rotate-in-prod}
      # Cold-tier archive (M4 — ADR-0027). Dev defaults to the SeaweedFS
      # sidecar; production overrides COLD_STORAGE_PROVIDER=aws + the
      # corresponding region/credentials.
      COLD_STORAGE_PROVIDER: ${COLD_STORAGE_PROVIDER:-seaweedfs}
      COLD_STORAGE_BUCKET: ${COLD_STORAGE_BUCKET:-audit-archive}
      COLD_STORAGE_ENDPOINT: ${COLD_STORAGE_ENDPOINT:-http://seaweedfs:8333}
      COLD_STORAGE_REGION: ${COLD_STORAGE_REGION:-us-east-1}
      COLD_STORAGE_ACCESS_KEY: ${COLD_STORAGE_ACCESS_KEY:-dev-access-key}
      COLD_STORAGE_SECRET_KEY: ${COLD_STORAGE_SECRET_KEY:-dev-secret-key}
      SESSION_IDLE_TIMEOUT_SECONDS: '900'
      SESSION_ABSOLUTE_TIMEOUT_SECONDS: '43200'
      LOG_LEVEL: info
      # OTel ON (M5). The SDK starts in apps/web/src/server.ts and ships
      # traces/metrics/logs to the collector. OTEL_SAMPLE_RATIO is the
      # head-sampler knob; tail sampling (errors / slow / admin / access-log
      # → 100%) lives in apps/web/docker/otel/collector-config.yaml.
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ehrbase-ui
      OTEL_SAMPLE_RATIO: '0.1'
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: '0.1'
      OTEL_LOG_LEVEL: WARN
      APP_VERSION: dev
    volumes:
      - audit_logs:/var/log/ehrbase-ui
    ports: ['3000:3000']
    networks: [ehrbase-net]

volumes:
  ehrbase_pg:
  platform_pg:
  valkey_data:
  clamav_data:
  audit_logs:
  seaweedfs_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  ehrbase-net:
    driver: bridge
